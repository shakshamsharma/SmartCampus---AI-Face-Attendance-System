<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SmartCampus AI</title>
<style>
/* ── THEME VARIABLES ─────────────────────────────── */
[data-theme="dark"] {
  --bg:       #0f0f0f;
  --bg2:      #161616;
  --bg3:      #1c1c1c;
  --bg4:      #242424;
  --card:     #181818;
  --card2:    #1e1e1e;
  --border:   #2a2a2a;
  --border2:  #333;
  --text:     #f0f0f0;
  --text2:    #999;
  --text3:    #555;
  --accent:   #6366f1;
  --accent2:  #818cf8;
  --green:    #22c55e;
  --red:      #ef4444;
  --yellow:   #f59e0b;
  --blue:     #3b82f6;
  --shadow:   0 1px 3px rgba(0,0,0,.4), 0 4px 16px rgba(0,0,0,.3);
  --shadow2:  0 8px 32px rgba(0,0,0,.5);
  --overlay:  rgba(0,0,0,.7);
}
[data-theme="light"] {
  --bg:       #f8f8f8;
  --bg2:      #ffffff;
  --bg3:      #f1f1f1;
  --bg4:      #e8e8e8;
  --card:     #ffffff;
  --card2:    #fafafa;
  --border:   #e5e5e5;
  --border2:  #d4d4d4;
  --text:     #111;
  --text2:    #666;
  --text3:    #aaa;
  --accent:   #4f46e5;
  --accent2:  #6366f1;
  --green:    #16a34a;
  --red:      #dc2626;
  --yellow:   #d97706;
  --blue:     #2563eb;
  --shadow:   0 1px 3px rgba(0,0,0,.08), 0 4px 16px rgba(0,0,0,.06);
  --shadow2:  0 8px 32px rgba(0,0,0,.12);
  --overlay:  rgba(0,0,0,.4);
}

/* ── RESET & BASE ────────────────────────────────── */
*{margin:0;padding:0;box-sizing:border-box}
html{font-size:15px}
body{
  font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif;
  background:var(--bg);
  color:var(--text);
  min-height:100vh;
  transition: background .25s, color .25s;
  overflow-x:hidden;
}
::-webkit-scrollbar{width:5px;height:5px}
::-webkit-scrollbar-track{background:transparent}
::-webkit-scrollbar-thumb{background:var(--border2);border-radius:4px}

/* ── TYPOGRAPHY ──────────────────────────────────── */
h1{font-size:1.5rem;font-weight:700;letter-spacing:-.02em}
h2{font-size:1.2rem;font-weight:600}
h3{font-size:1rem;font-weight:600}

/* ── LAYOUT ──────────────────────────────────────── */
.layout{display:flex;min-height:100vh}
.sidebar{
  width:220px;flex-shrink:0;
  background:var(--bg2);
  border-right:1px solid var(--border);
  position:fixed;left:0;top:0;bottom:0;
  display:flex;flex-direction:column;
  overflow-y:auto;z-index:50;
}
.main{
  margin-left:220px;
  flex:1;
  padding:28px 32px;
  min-height:100vh;
  background:var(--bg);
  max-width:calc(100vw - 220px);
}

/* ── SIDEBAR ─────────────────────────────────────── */
.sidebar-logo{
  padding:22px 20px 16px;
  border-bottom:1px solid var(--border);
  display:flex;align-items:center;gap:10px;
}
.logo-icon{
  width:34px;height:34px;
  background:var(--accent);
  border-radius:9px;
  display:flex;align-items:center;justify-content:center;
  font-size:17px;flex-shrink:0;
}
.logo-text{font-size:.9rem;font-weight:700;letter-spacing:-.01em}
.logo-sub{font-size:.7rem;color:var(--text3);margin-top:1px}

.nav-section{padding:12px 8px 4px}
.nav-label{font-size:.65rem;font-weight:600;color:var(--text3);text-transform:uppercase;letter-spacing:.08em;padding:0 10px;margin-bottom:4px}
.nav-item{
  display:flex;align-items:center;gap:10px;
  padding:9px 10px;border-radius:8px;
  cursor:pointer;font-size:.88rem;color:var(--text2);
  transition:all .15s;margin:1px 0;
}
.nav-item:hover{background:var(--bg3);color:var(--text)}
.nav-item.active{background:var(--accent);color:#fff}
.nav-item.active .nav-icon{opacity:1}
.nav-icon{font-size:15px;width:18px;text-align:center;flex-shrink:0;opacity:.7}

.sidebar-footer{
  margin-top:auto;
  padding:14px;
  border-top:1px solid var(--border);
}
.user-chip{
  display:flex;align-items:center;gap:9px;
  padding:9px 10px;border-radius:8px;
  background:var(--bg3);margin-bottom:8px;
}
.avatar{
  width:30px;height:30px;border-radius:50%;
  display:flex;align-items:center;justify-content:center;
  font-size:.75rem;font-weight:700;flex-shrink:0;
}
.user-name{font-size:.82rem;font-weight:600;line-height:1.3}
.user-id{font-size:.7rem;color:var(--text3)}

/* ── TOPBAR ──────────────────────────────────────── */
.topbar{
  display:flex;align-items:center;justify-content:space-between;
  margin-bottom:28px;
}
.page-title{font-size:1.3rem;font-weight:700;letter-spacing:-.02em}
.page-sub{font-size:.8rem;color:var(--text2);margin-top:2px}
.topbar-actions{display:flex;align-items:center;gap:10px}

/* ── BUTTONS ─────────────────────────────────────── */
.btn{
  display:inline-flex;align-items:center;gap:6px;
  padding:8px 16px;border-radius:8px;border:none;
  cursor:pointer;font-size:.85rem;font-weight:500;
  transition:all .15s;white-space:nowrap;
  font-family:inherit;
}
.btn:disabled{opacity:.45;cursor:not-allowed}
.btn-primary{background:var(--accent);color:#fff}
.btn-primary:hover:not(:disabled){background:var(--accent2)}
.btn-ghost{background:transparent;border:1px solid var(--border2);color:var(--text2)}
.btn-ghost:hover:not(:disabled){border-color:var(--text2);color:var(--text)}
.btn-danger{background:var(--red);color:#fff}
.btn-danger:hover:not(:disabled){opacity:.85}
.btn-success{background:var(--green);color:#fff}
.btn-success:hover:not(:disabled){opacity:.85}
.btn-sm{padding:6px 12px;font-size:.8rem;border-radius:7px}
.btn-xs{padding:4px 10px;font-size:.75rem;border-radius:6px}
.btn-icon{padding:7px;border-radius:8px;width:34px;height:34px;justify-content:center}

/* ── CARDS ───────────────────────────────────────── */
.card{
  background:var(--card);
  border:1px solid var(--border);
  border-radius:12px;
  padding:20px;
  box-shadow:var(--shadow);
}
.card-sm{padding:14px}
.card-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:18px}
.card-title{font-size:.95rem;font-weight:600;display:flex;align-items:center;gap:7px}

/* ── KPI CARDS ───────────────────────────────────── */
.kpi-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(150px,1fr));gap:12px;margin-bottom:24px}
.kpi{
  background:var(--card);border:1px solid var(--border);
  border-radius:12px;padding:18px;
  box-shadow:var(--shadow);
  transition:transform .15s,box-shadow .15s;
}
.kpi:hover{transform:translateY(-1px);box-shadow:var(--shadow2)}
.kpi-label{font-size:.72rem;color:var(--text3);text-transform:uppercase;letter-spacing:.07em;font-weight:500;margin-bottom:8px}
.kpi-value{font-size:1.7rem;font-weight:700;letter-spacing:-.03em;line-height:1}
.kpi-sub{font-size:.75rem;color:var(--text3);margin-top:6px}
.kpi-badge{display:inline-flex;align-items:center;gap:4px;margin-top:8px;font-size:.73rem;font-weight:500;padding:3px 8px;border-radius:20px}

/* ── INPUTS ──────────────────────────────────────── */
.input{
  background:var(--bg3);border:1px solid var(--border);
  border-radius:8px;padding:9px 13px;
  color:var(--text);font-size:.87rem;width:100%;
  outline:none;transition:border .15s;
  font-family:inherit;
}
.input:focus{border-color:var(--accent)}
.input::placeholder{color:var(--text3)}
select.input{cursor:pointer}
.input-group{margin-bottom:14px}
.input-label{font-size:.78rem;font-weight:500;color:var(--text2);display:block;margin-bottom:5px}

/* ── BADGES ──────────────────────────────────────── */
.badge{display:inline-flex;align-items:center;gap:4px;padding:3px 9px;border-radius:20px;font-size:.72rem;font-weight:600}
.badge-green{background:color-mix(in srgb,var(--green) 12%,transparent);color:var(--green);border:1px solid color-mix(in srgb,var(--green) 25%,transparent)}
.badge-red{background:color-mix(in srgb,var(--red) 12%,transparent);color:var(--red);border:1px solid color-mix(in srgb,var(--red) 25%,transparent)}
.badge-yellow{background:color-mix(in srgb,var(--yellow) 12%,transparent);color:var(--yellow);border:1px solid color-mix(in srgb,var(--yellow) 25%,transparent)}
.badge-blue{background:color-mix(in srgb,var(--blue) 12%,transparent);color:var(--blue);border:1px solid color-mix(in srgb,var(--blue) 25%,transparent)}
.badge-purple{background:color-mix(in srgb,var(--accent) 12%,transparent);color:var(--accent);border:1px solid color-mix(in srgb,var(--accent) 25%,transparent)}

/* ── TABLES ──────────────────────────────────────── */
.table-wrap{overflow-x:auto}
table{width:100%;border-collapse:collapse;font-size:.85rem}
th{text-align:left;padding:10px 14px;font-size:.7rem;font-weight:600;color:var(--text3);text-transform:uppercase;letter-spacing:.07em;border-bottom:1px solid var(--border)}
td{padding:12px 14px;border-bottom:1px solid var(--border);color:var(--text2)}
tr:last-child td{border-bottom:none}
tr:hover td{background:var(--bg3)}

/* ── MODAL ───────────────────────────────────────── */
.modal-bg{position:fixed;inset:0;background:var(--overlay);z-index:200;display:flex;align-items:center;justify-content:center;backdrop-filter:blur(4px)}
.modal{background:var(--card);border:1px solid var(--border2);border-radius:16px;padding:28px;width:90%;max-width:520px;max-height:88vh;overflow-y:auto;box-shadow:var(--shadow2)}
.modal-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:20px}
.modal-title{font-size:1.05rem;font-weight:700}
.modal-close{background:none;border:none;cursor:pointer;color:var(--text3);font-size:20px;line-height:1;padding:2px}
.modal-close:hover{color:var(--text)}

/* ── THEME TOGGLE ────────────────────────────────── */
.theme-toggle{
  width:50px;height:26px;border-radius:13px;
  border:none;cursor:pointer;position:relative;
  transition:background .2s;background:var(--border2);
  flex-shrink:0;
}
.theme-toggle-knob{
  position:absolute;top:3px;left:3px;
  width:20px;height:20px;border-radius:50%;
  background:var(--text);transition:transform .2s,background .2s;
  display:flex;align-items:center;justify-content:center;font-size:11px;
}
[data-theme="dark"] .theme-toggle-knob{transform:translateX(24px)}

/* ── NOTIFICATION ────────────────────────────────── */
.notif-btn{position:relative}
.notif-badge{
  position:absolute;top:-4px;right:-4px;
  background:var(--red);color:#fff;
  border-radius:50%;width:16px;height:16px;
  font-size:.6rem;font-weight:700;
  display:flex;align-items:center;justify-content:center;
  border:2px solid var(--bg);
}
.notif-panel{
  position:fixed;top:65px;right:24px;width:340px;
  background:var(--card);border:1px solid var(--border2);
  border-radius:14px;z-index:100;box-shadow:var(--shadow2);
  overflow:hidden;max-height:76vh;display:flex;flex-direction:column;
}
.notif-header{padding:14px 18px;border-bottom:1px solid var(--border);display:flex;justify-content:space-between;align-items:center}
.notif-list{overflow-y:auto;flex:1}
.notif-item{padding:13px 18px;border-bottom:1px solid var(--border);display:flex;gap:11px;cursor:pointer;transition:background .12s}
.notif-item:hover{background:var(--bg3)}
.notif-item.unread{background:color-mix(in srgb,var(--accent) 5%,transparent)}
.notif-item:last-child{border-bottom:none}
.notif-dot{width:6px;height:6px;border-radius:50%;background:var(--accent);flex-shrink:0;margin-top:5px}

/* ── PROGRESS ────────────────────────────────────── */
.progress{height:4px;background:var(--border);border-radius:2px;overflow:hidden}
.progress-fill{height:100%;border-radius:2px;transition:width .6s ease}

/* ── DIVIDER ─────────────────────────────────────── */
.divider{height:1px;background:var(--border);margin:16px 0}

/* ── EMPTY STATE ─────────────────────────────────── */
.empty{display:flex;flex-direction:column;align-items:center;justify-content:center;padding:48px 24px;color:var(--text3);gap:10px;text-align:center}
.empty-icon{font-size:2rem;opacity:.5}
.empty-text{font-size:.88rem}

/* ── TOAST ───────────────────────────────────────── */
.toast{
  position:fixed;bottom:24px;left:50%;transform:translateX(-50%);
  background:var(--card);border:1px solid var(--border2);
  border-radius:10px;padding:11px 18px;font-size:.85rem;font-weight:500;
  z-index:9999;box-shadow:var(--shadow2);
  display:flex;align-items:center;gap:8px;white-space:nowrap;
  animation:slideUp .25s ease;
}
@keyframes slideUp{from{opacity:0;transform:translate(-50%,12px)}to{opacity:1;transform:translate(-50%,0)}}

/* ── WEBCAM ──────────────────────────────────────── */
.cam-wrap{
  position:relative;width:100%;border-radius:12px;
  overflow:hidden;background:#000;
  border:1px solid var(--border);
}
.cam-video{width:100%;display:block;transform:scaleX(-1);max-height:320px;object-fit:cover}
.cam-overlay{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;flex-direction:column;gap:10px}
.scan-bar{
  position:absolute;left:0;right:0;height:2px;
  background:linear-gradient(90deg,transparent,var(--accent),transparent);
  animation:scanMove 2s linear infinite;
  box-shadow:0 0 10px var(--accent);
}
@keyframes scanMove{0%{top:0}100%{top:100%}}
.face-guide{
  position:absolute;top:50%;left:50%;transform:translate(-50%,-55%);
  width:140px;height:170px;border-radius:50%;
  border:2px solid rgba(99,102,241,.5);pointer-events:none;
}

/* ── CHAT ────────────────────────────────────────── */
.chat-widget{position:fixed;bottom:22px;right:22px;z-index:80}
.chat-fab{
  width:48px;height:48px;border-radius:50%;
  background:var(--accent);color:#fff;border:none;cursor:pointer;
  display:flex;align-items:center;justify-content:center;font-size:20px;
  box-shadow:0 4px 20px color-mix(in srgb,var(--accent) 40%,transparent);
  transition:transform .15s;
}
.chat-fab:hover{transform:scale(1.07)}
.chat-box{
  position:absolute;bottom:60px;right:0;
  width:320px;height:420px;
  background:var(--card);border:1px solid var(--border2);
  border-radius:14px;display:flex;flex-direction:column;
  box-shadow:var(--shadow2);overflow:hidden;
  animation:slideUp .2s ease;
}
.chat-msg{
  max-width:82%;padding:9px 13px;border-radius:12px;
  font-size:.83rem;line-height:1.5;margin-bottom:5px;
}
.chat-msg.bot{background:var(--bg3);color:var(--text);border-bottom-left-radius:3px;border:1px solid var(--border)}
.chat-msg.user{background:var(--accent);color:#fff;align-self:flex-end;border-bottom-right-radius:3px}

/* ── ANIMATIONS ──────────────────────────────────── */
@keyframes fadeIn{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
@keyframes spin{to{transform:rotate(360deg)}}
.fade-in{animation:fadeIn .25s ease both}
.spin{animation:spin .7s linear infinite}
.spinner{width:32px;height:32px;border:2.5px solid var(--border);border-top-color:var(--accent);border-radius:50%;animation:spin .7s linear infinite}

/* ── ANGLE CAPTURE ───────────────────────────────── */
.angle-step{
  display:flex;flex-direction:column;align-items:center;gap:5px;
  width:62px;cursor:default;
}
.angle-circle{
  width:48px;height:48px;border-radius:50%;
  border:1.5px solid var(--border2);
  display:flex;align-items:center;justify-content:center;
  font-size:20px;transition:all .2s;
}
.angle-circle.done{border-color:var(--green);background:color-mix(in srgb,var(--green) 10%,transparent)}
.angle-circle.active{border-color:var(--accent);background:color-mix(in srgb,var(--accent) 10%,transparent);animation:pulse .9s ease-in-out infinite}
.angle-circle.pending{opacity:.35}
.angle-label{font-size:.65rem;color:var(--text3);text-align:center}
@keyframes pulse{0%,100%{box-shadow:none}50%{box-shadow:0 0 0 4px color-mix(in srgb,var(--accent) 20%,transparent)}}

/* ── SUBJECT CARDS ───────────────────────────────── */
.subject-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(155px,1fr));gap:12px}
.subject-card{
  background:var(--card);border:1px solid var(--border);
  border-radius:12px;padding:16px;transition:transform .15s;
}
.subject-card:hover{transform:translateY(-1px)}
.subject-name{font-size:.72rem;color:var(--text3);text-transform:uppercase;letter-spacing:.07em;font-weight:600;margin-bottom:10px}
.subject-pct{font-size:1.6rem;font-weight:700;letter-spacing:-.03em;margin-bottom:8px}
.subject-detail{font-size:.73rem;color:var(--text3);margin-top:6px}

/* ── STEP INDICATOR ──────────────────────────────── */
.steps{display:flex;align-items:center;margin-bottom:24px}
.step{display:flex;align-items:center;gap:6px}
.step-num{
  width:24px;height:24px;border-radius:50%;
  display:flex;align-items:center;justify-content:center;
  font-size:.75rem;font-weight:700;
  border:1.5px solid var(--border2);color:var(--text3);
  transition:all .2s;flex-shrink:0;
}
.step-num.done{background:var(--green);border-color:var(--green);color:#fff}
.step-num.active{background:var(--accent);border-color:var(--accent);color:#fff}
.step-text{font-size:.8rem;font-weight:500;color:var(--text3)}
.step-text.active{color:var(--text)}
.step-line{flex:1;height:1px;background:var(--border);margin:0 10px}
.step-line.done{background:var(--green)}

/* ── SCAN RESULTS ────────────────────────────────── */
.scan-student{
  display:flex;align-items:center;gap:12px;
  padding:12px 14px;border-radius:10px;margin-bottom:8px;
  border:1px solid var(--border);
  animation:fadeIn .2s ease both;
}
.scan-student.present{border-color:color-mix(in srgb,var(--green) 30%,transparent);background:color-mix(in srgb,var(--green) 5%,transparent)}
.scan-student.verify{border-color:color-mix(in srgb,var(--yellow) 30%,transparent);background:color-mix(in srgb,var(--yellow) 5%,transparent)}
.scan-student.absent{border-color:color-mix(in srgb,var(--red) 20%,transparent);background:color-mix(in srgb,var(--red) 4%,transparent)}
.conf-bar{height:3px;border-radius:2px;margin-top:4px;background:var(--border)}
.conf-fill{height:100%;border-radius:2px}

/* ── GRID ────────────────────────────────────────── */
.grid-2{display:grid;grid-template-columns:1fr 1fr;gap:16px}
.grid-3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:12px}
@media(max-width:1000px){.grid-2{grid-template-columns:1fr}}

/* ── TAB BAR ─────────────────────────────────────── */
.tab-bar{display:flex;gap:2px;background:var(--bg3);border-radius:9px;padding:3px;border:1px solid var(--border)}
.tab{flex:1;padding:8px 12px;border-radius:7px;text-align:center;cursor:pointer;font-size:.82rem;font-weight:500;color:var(--text2);transition:all .15s}
.tab.active{background:var(--card);color:var(--text);box-shadow:var(--shadow)}

/* ── SESSION LIVE BADGE ──────────────────────────── */
.live-badge{display:inline-flex;align-items:center;gap:5px;padding:3px 9px;border-radius:20px;font-size:.73rem;font-weight:600;background:color-mix(in srgb,var(--green) 12%,transparent);color:var(--green);border:1px solid color-mix(in srgb,var(--green) 25%,transparent)}
.live-dot{width:6px;height:6px;border-radius:50%;background:var(--green);animation:pulse 1s ease-in-out infinite}

/* ── LOGIN PAGE ──────────────────────────────────── */
.login-wrap{min-height:100vh;display:flex;align-items:center;justify-content:center;background:var(--bg);padding:20px}
.login-card{width:100%;max-width:390px;background:var(--card);border:1px solid var(--border);border-radius:16px;padding:36px;box-shadow:var(--shadow2)}
.login-logo{text-align:center;margin-bottom:28px}
.login-logo-icon{width:52px;height:52px;background:var(--accent);border-radius:14px;display:flex;align-items:center;justify-content:center;font-size:24px;margin:0 auto 12px}
.login-title{font-size:1.2rem;font-weight:700;letter-spacing:-.02em}
.login-sub{font-size:.8rem;color:var(--text3);margin-top:3px}
.hint-box{background:var(--bg3);border-radius:8px;padding:9px 13px;font-size:.75rem;color:var(--text3);margin-top:12px;border:1px solid var(--border)}

/* ── RESPONSIVE ──────────────────────────────────── */
@media(max-width:768px){
  .sidebar{width:100%;height:auto;position:relative;flex-direction:row;flex-wrap:wrap}
  .main{margin-left:0;padding:16px}
}
</style>
</head>
<body>
<div id="root">
  <div style="display:flex;align-items:center;justify-content:center;height:100vh;flex-direction:column;gap:14px;color:var(--text2)">
    <div class="spinner"></div>
    <span style="font-size:.9rem">Loading SmartCampus AI…</span>
  </div>
</div>

<script>
const BASE = 'http://127.0.0.1:8001/api';
const {
  useState,
  useEffect,
  useRef,
  useCallback,
  useMemo
} = React;

// ── THEME ─────────────────────────────────────────────────────────────────
function useTheme() {
  const [theme, setTheme] = useState(() => localStorage.getItem('sc_theme') || 'dark');
  useEffect(() => {
    document.documentElement.setAttribute('data-theme', theme);
    localStorage.setItem('sc_theme', theme);
  }, [theme]);
  const toggle = () => setTheme(t => t === 'dark' ? 'light' : 'dark');
  return {
    theme,
    toggle
  };
}

// ── API ────────────────────────────────────────────────────────────────────
const api = {
  token: () => localStorage.getItem('sc_tok'),
  user: () => {
    try {
      return JSON.parse(localStorage.getItem('sc_usr'));
    } catch {
      return null;
    }
  },
  setAuth: (t, u) => {
    localStorage.setItem('sc_tok', t);
    localStorage.setItem('sc_usr', JSON.stringify(u));
  },
  clear: () => {
    localStorage.removeItem('sc_tok');
    localStorage.removeItem('sc_usr');
  },
  req: async (path, opts = {}) => {
    const tok = localStorage.getItem('sc_tok');
    const res = await fetch(`${BASE}${path}`, {
      ...opts,
      headers: {
        'Content-Type': 'application/json',
        ...(tok ? {
          Authorization: `Bearer ${tok}`
        } : {}),
        ...(opts.headers || {})
      }
    });
    if (!res.ok) {
      const e = await res.json().catch(() => ({
        detail: 'Error'
      }));
      throw new Error(e.detail || 'Request failed');
    }
    const ct = res.headers.get('Content-Type') || '';
    return ct.includes('json') ? res.json() : res.blob();
  }
};
['login', 'logout'].forEach(() => {});
api.login = (id, pw, role) => api.req('/auth/login', {
  method: 'POST',
  body: JSON.stringify({
    id,
    password: pw,
    role
  })
});
api.studentDashboard = () => api.req('/student/dashboard');
api.attendanceLogs = sub => api.req(`/student/attendance-logs${sub ? `?subject=${sub}` : ''}`);
api.monthlyTrend = () => api.req('/student/monthly-trend');
api.registerFace = images => api.req('/student/register-face', {
  method: 'POST',
  body: JSON.stringify({
    images
  })
});
api.reRegFace = images => api.req('/student/re-register-face', {
  method: 'POST',
  body: JSON.stringify({
    images
  })
});
api.submitLeave = d => api.req('/student/leave', {
  method: 'POST',
  body: JSON.stringify(d)
});
api.raiseDispute = d => api.req('/student/dispute', {
  method: 'POST',
  body: JSON.stringify(d)
});
api.facultyDashboard = () => api.req('/faculty/dashboard');
api.facultyStudents = s => api.req(`/faculty/students${s ? `?search=${encodeURIComponent(s)}` : ''}`);
api.startSession = d => api.req('/faculty/session/start', {
  method: 'POST',
  body: JSON.stringify(d)
});
api.scanFrames = (frames, session_id) => api.req('/faculty/session/scan-frames', {
  method: 'POST',
  body: JSON.stringify({
    frames,
    session_id
  })
});
api.endSession = d => api.req('/faculty/session/end', {
  method: 'POST',
  body: JSON.stringify(d)
});
api.manualMark = d => api.req('/faculty/manual-mark', {
  method: 'POST',
  body: JSON.stringify(d)
});
api.facultyAnalytics = () => api.req('/faculty/analytics');
api.adminDashboard = () => api.req('/admin/dashboard');
api.adminStudents = s => api.req(`/admin/students${s ? `?search=${encodeURIComponent(s)}` : ''}`);
api.addStudent = d => api.req('/admin/students', {
  method: 'POST',
  body: JSON.stringify(d)
});
api.deleteStudent = reg => api.req(`/admin/students/${reg}`, {
  method: 'DELETE'
});
api.disputes = () => api.req('/admin/disputes');
api.resolveDispute = (id, a) => api.req(`/admin/disputes/${id}/resolve?action=${a}`, {
  method: 'POST'
});
api.adminAnalytics = () => api.req('/admin/analytics');
api.auditLogs = () => api.req('/admin/audit-logs');
api.allAttendance = (s, d) => {
  let u = '/admin/attendance-records';
  const p = [];
  if (s) p.push(`subject=${s}`);
  if (d) p.push(`date=${d}`);
  return api.req(p.length ? u + '?' + p.join('&') : u);
};
api.updateRecord = (id, st) => api.req(`/admin/attendance-records/${id}?status=${st}`, {
  method: 'PUT'
});
api.notifications = () => api.req('/notifications');
api.markRead = id => api.req(`/notifications/${id}/read`, {
  method: 'POST'
});
api.downloadReport = async (fmt, sub, df, dt) => {
  let u = `/reports/attendance?format=${fmt}`;
  if (sub) u += `&subject=${sub}`;
  if (df) u += `&date_from=${df}`;
  if (dt) u += `&date_to=${dt}`;
  const b = await api.req(u);
  const ext = fmt === 'excel' ? 'xlsx' : fmt;
  const a = document.createElement('a');
  a.href = URL.createObjectURL(b);
  a.download = `attendance.${ext}`;
  a.click();
};

// ── HOOKS ──────────────────────────────────────────────────────────────────
function useFetch(fn, deps = []) {
  const [data, setData] = useState(null);
  const [loading, setLoading] = useState(true);
  const [error, setError] = useState(null);
  const load = useCallback(() => {
    setLoading(true);
    setError(null);
    fn().then(d => {
      setData(d);
      setLoading(false);
    }).catch(e => {
      setError(e.message);
      setLoading(false);
    });
  }, []);
  useEffect(() => {
    load();
  }, [...deps]);
  return {
    data,
    loading,
    error,
    refetch: load
  };
}
